<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nara Pustaka Invoice Generator</title>
  
  <!-- Memuat Tailwind CSS untuk Styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Memuat React dan ReactDOM (Versi Stabil dari cdnjs) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Memuat Babel Standalone (Versi Stabil dari cdnjs) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js" crossorigin></script>

  <!-- Memuat html2pdf secara statis di head untuk mencegah error appendChild saat runtime -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" crossorigin></script>
  
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    /* Clip path dipertahankan, berfungsi baik di html2pdf versi terbaru */
    .clip-slant { clip-path: polygon(0 0, 100% 0, 95% 100%, 0 100%); }
    .clip-slant-reverse { clip-path: polygon(5% 0, 100% 0, 100% 100%, 0 100%); }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
  </style>
</head>
<body class="bg-gray-100">

  <!-- Tempat React akan dirender -->
  <div id="root"></div>

  <!-- Kode Aplikasi Utama -->
  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect } = React;

    // --- Komponen Ikon ---
    const Printer = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><path d="M6 9V3a1 1 0 0 1 1-1h10a1 1 0 0 1 1 1v6"/><rect width="12" height="8" x="6" y="14" rx="1"/></svg>;
    const Phone = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>;
    const Mail = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>;
    const Plus = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M5 12h14"/><path d="M12 5v14"/></svg>;
    const Trash2 = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>;
    const Save = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>;
    const CheckCircle = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg>;
    
    // Ikon Logo Pustaka/Buku Permanen
    const BookLogo = ({ size=48, className="" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/>
      </svg>
    );

    function App() {
      const getToday = () => new Date().toISOString().split('T')[0];
      const getDueDate = () => {
        const due = new Date();
        due.setDate(due.getDate() + 5);
        return due.toISOString().split('T')[0];
      };

      const [invoiceData, setInvoiceData] = useState({
        invoiceNo: `INV-${new Date().getFullYear()}${String(new Date().getMonth() + 1).padStart(2, '0')}-${String(new Date().getDate()).padStart(2, '0')}-${Math.floor(Math.random() * 1000)}`,
        date: getToday(),
        dueDate: getDueDate(),
        customerName: 'Ahmad Dahlan',
        notes: 'Dikirim ke:\nJl. Sudirman No. 45, Jakarta Selatan\n(Mohon dipacking kayu)',
        shippingCost: 25000,
      });

      const [items, setItems] = useState([
        { id: Date.now(), description: 'Buku Mahir Pemrograman Web', qty: 2, price: 150000 }
      ]);

      const [toast, setToast] = useState({ show: false, message: '', type: 'success' });
      const [isSaving, setIsSaving] = useState(false);
      const [isPrinting, setIsPrinting] = useState(false);
      const [scale, setScale] = useState(1);

      useEffect(() => {
        const updateScale = () => {
          // Basis 794px untuk render A4 agar sangat presisi
          if (window.innerWidth < 1024) {
            const newScale = (window.innerWidth - 32) / 794; 
            setScale(newScale < 1 ? newScale : 1);
          } else {
            setScale(1);
          }
        };
        updateScale();
        window.addEventListener('resize', updateScale);
        return () => window.removeEventListener('resize', updateScale);
      }, []);

      const subtotal = items.reduce((sum, item) => sum + (Number(item.qty) * Number(item.price)), 0);
      const total = subtotal + Number(invoiceData.shippingCost);

      const handleInputChange = (e) => {
        const { name, value } = e.target;
        setInvoiceData({ ...invoiceData, [name]: value });
      };

      const handleItemChange = (index, field, value) => {
        const newItems = [...items];
        newItems[index][field] = value;
        setItems(newItems);
      };

      const addItem = () => {
        if (items.length >= 8) {
          showToast('Batas maksimum baris tercapai untuk 1 lembar A4.', 'error');
          return;
        }
        setItems([...items, { id: Date.now(), description: '', qty: 1, price: 0 }]);
      };

      const removeItem = (index) => {
        if (items.length > 1) {
          const newItems = items.filter((_, i) => i !== index);
          setItems(newItems);
        }
      };

      const showToast = (message, type = 'success') => {
        setToast({ show: true, message, type });
        setTimeout(() => setToast({ show: false, message: '', type: 'success' }), 3000);
      };

      // LOGIKA CETAK PDF YANG DIPERBAIKI (Sudah tidak memuat script secara dinamis)
      const handlePrint = async () => {
        setIsPrinting(true);
        showToast('Menyiapkan 1 Lembar PDF...', 'success');

        try {
          const html2pdf = window.html2pdf;
          if (!html2pdf) {
            throw new Error('Pustaka pdf belum termuat di browser.');
          }

          const element = document.getElementById('invoice-capture');
          
          const opt = {
            margin:       0,
            filename:     `${invoiceData.invoiceNo}.pdf`,
            image:        { type: 'jpeg', quality: 1 }, // Kualitas maksimum
            html2canvas:  { 
              scale: 2, // Resolusi render ganda agar teks tajam
              useCORS: true, 
              logging: false,
              letterRendering: true,
              windowWidth: 794, // Mengunci lebar render kanvas
              onclone: (clonedDoc) => {
                const el = clonedDoc.getElementById('invoice-capture');
                // Mereset skala agar PDF tidak ikut mengecil seperti di layar HP
                el.style.transform = 'none'; 
                el.style.width = '794px';    
                el.style.height = '1123px';  
                el.style.boxShadow = 'none'; // Hilangkan bayangan saat di-PDF
              }
            },
            // Format A4 dalam satuan Pixel (794x1123) untuk akurasi 100%
            jsPDF: { unit: 'px', format: [794, 1123], orientation: 'portrait' },
            // Menghindari elemen terpotong acak
            pagebreak: { mode: 'avoid-all' }
          };

          await html2pdf().set(opt).from(element).save();
          showToast('PDF berhasil diunduh!', 'success');
        } catch (error) {
          console.error(error);
          showToast('Gagal membuat PDF. Coba segarkan halaman.', 'error');
        } finally {
          setIsPrinting(false);
        }
      };

      const saveToGoogleSheets = async () => {
        setIsSaving(true);
        setTimeout(() => {
          setIsSaving(false);
          showToast('Simulasi: Data berhasil disimpan!', 'success');
        }, 1000);
      };

      const formatDateId = (dateString) => {
        if (!dateString) return '';
        const dateObj = new Date(dateString);
        return dateObj.toLocaleDateString('id-ID', { day: '2-digit', month: 'long', year: 'numeric' });
      };

      return (
        <div className="min-h-screen font-sans text-gray-800 flex flex-col lg:flex-row relative w-full overflow-x-hidden">
          
          {toast.show && (
            <div className={`fixed top-4 right-4 z-50 flex items-center gap-2 px-4 py-3 rounded-lg shadow-lg text-white font-medium transition-all duration-300 transform translate-y-0 opacity-100 ${toast.type === 'success' ? 'bg-green-600' : 'bg-red-600'}`}>
              <CheckCircle size={20} />
              {toast.message}
            </div>
          )}

          {/* PANEL ADMIN */}
          <div className="w-full lg:w-1/3 bg-white lg:border-r border-gray-200 p-4 lg:p-6 lg:overflow-y-auto lg:h-screen shadow-md z-10 relative custom-scrollbar">
            <div className="flex items-center gap-3 mb-6 border-b pb-4">
              <div className="bg-red-600 p-2 rounded-lg text-white">
                <Printer size={24} />
              </div>
              <div>
                <h2 className="text-xl font-bold text-gray-800">Admin Panel</h2>
                <p className="text-xs text-gray-500">Nara Pustaka Invoice Generator</p>
              </div>
            </div>

            <div className="space-y-4">
              <div className="grid grid-cols-2 gap-3">
                <div>
                  <label className="block text-xs font-semibold text-gray-600 mb-1">No. Invoice</label>
                  <input type="text" name="invoiceNo" value={invoiceData.invoiceNo} onChange={handleInputChange} className="w-full border rounded px-3 py-2 text-sm focus:outline-none focus:border-red-500" />
                </div>
                <div>
                  <label className="block text-xs font-semibold text-gray-600 mb-1">Tanggal</label>
                  <input type="date" name="date" value={invoiceData.date} onChange={handleInputChange} className="w-full border rounded px-3 py-2 text-sm focus:outline-none focus:border-red-500" />
                </div>
              </div>

              <div>
                <label className="block text-xs font-semibold text-gray-600 mb-1">Nama Pembeli</label>
                <input type="text" name="customerName" value={invoiceData.customerName} onChange={handleInputChange} className="w-full border rounded px-3 py-2 text-sm focus:outline-none focus:border-red-500" />
              </div>

              <div>
                <label className="block text-xs font-semibold text-gray-600 mb-1">Catatan / Alamat Tujuan</label>
                <textarea name="notes" value={invoiceData.notes} onChange={handleInputChange} rows="2" className="w-full border rounded px-3 py-2 text-sm focus:outline-none focus:border-red-500"></textarea>
              </div>
              
              <div>
                <label className="block text-xs font-semibold text-gray-600 mb-1">Tanggal Jatuh Tempo</label>
                <input type="date" name="dueDate" value={invoiceData.dueDate} onChange={handleInputChange} className="w-full border rounded px-3 py-2 text-sm focus:outline-none focus:border-red-500" />
              </div>

              <div className="bg-gray-50 p-4 rounded-lg border border-gray-200">
                <h3 className="text-sm font-bold text-gray-700 mb-3">Detail Pesanan</h3>
                
                {items.map((item, index) => (
                  <div key={item.id} className="mb-3 bg-white p-3 border border-gray-100 rounded shadow-sm relative">
                    {items.length > 1 && (
                      <button onClick={() => removeItem(index)} className="absolute top-2 right-2 text-red-400 hover:text-red-600 z-10 bg-white rounded">
                        <Trash2 size={16} />
                      </button>
                    )}
                    <div className="mb-2">
                      <label className="block text-[10px] font-semibold text-gray-500 mb-1">Deskripsi Item</label>
                      <input type="text" value={item.description} onChange={(e) => handleItemChange(index, 'description', e.target.value)} placeholder="Contoh: Buku..." className="w-full border-b px-2 py-1 text-sm focus:outline-none focus:border-red-500" />
                    </div>
                    <div className="grid grid-cols-2 gap-3">
                      <div>
                        <label className="block text-[10px] font-semibold text-gray-500 mb-1">Harga (Rp)</label>
                        <input type="number" value={item.price} onChange={(e) => handleItemChange(index, 'price', e.target.value)} className="w-full border-b px-2 py-1 text-sm focus:outline-none focus:border-red-500" />
                      </div>
                      <div>
                        <label className="block text-[10px] font-semibold text-gray-500 mb-1">Jumlah</label>
                        <input type="number" value={item.qty} onChange={(e) => handleItemChange(index, 'qty', e.target.value)} className="w-full border-b px-2 py-1 text-sm focus:outline-none focus:border-red-500" />
                      </div>
                    </div>
                  </div>
                ))}

                <button onClick={addItem} className="w-full py-2 border-2 border-dashed border-gray-300 text-gray-500 rounded-lg text-sm font-semibold hover:border-red-400 hover:text-red-500 transition flex items-center justify-center gap-1 mb-4">
                  <Plus size={16} /> Tambah Baris
                </button>

                <div>
                  <label className="block text-xs font-semibold text-gray-600 mb-1">Ongkos Kirim (Rp)</label>
                  <input type="number" name="shippingCost" value={invoiceData.shippingCost} onChange={handleInputChange} className="w-full border rounded px-3 py-2 text-sm focus:outline-none focus:border-red-500 bg-white" />
                </div>
              </div>

              <div className="grid grid-cols-2 gap-3 mt-2">
                <button onClick={saveToGoogleSheets} disabled={isSaving} className={`w-full py-3 px-2 rounded-lg font-bold flex items-center justify-center gap-1 transition duration-200 text-xs sm:text-sm ${isSaving ? 'bg-green-400 cursor-not-allowed' : 'bg-green-600 hover:bg-green-700 text-white shadow-lg shadow-green-200'}`}>
                  <Save size={16} /> Simpan
                </button>
                <button onClick={handlePrint} disabled={isPrinting} className={`w-full font-bold py-3 px-2 rounded-lg transition duration-200 flex items-center justify-center gap-1 text-xs sm:text-sm shadow-lg shadow-red-200 text-white ${isPrinting ? 'bg-red-400 cursor-not-allowed' : 'bg-red-600 hover:bg-red-700'}`}>
                  <Printer size={16} /> Cetak PDF
                </button>
              </div>
            </div>
          </div>

          {/* AREA PREVIEW INVOICE */}
          <div className="w-full lg:w-2/3 flex justify-center bg-gray-200 pt-6 pb-20 lg:p-10 lg:overflow-y-auto lg:h-screen">
            
            <div className="relative flex justify-center w-full" style={{ height: window.innerWidth < 1024 ? `${1123 * scale}px` : 'auto' }}>
              
              {/* KERTAS INVOICE */}
              <div id="invoice-capture" className="invoice-box bg-white w-[794px] h-[1123px] overflow-hidden shadow-2xl relative flex flex-col origin-top" style={{ transform: `scale(${scale})` }}>
                
                <div className="bg-[#1a1c23] pt-12 pb-10 px-12 relative flex justify-between items-start shrink-0">
                  <div className="text-white z-10 max-w-[50%]">
                    <div className="flex items-center gap-4">
                      {/* Logo Permanen Nara Pustaka */}
                      <div className="bg-red-600 p-2 rounded flex justify-center items-center shadow-lg">
                        <BookLogo size={36} className="text-white" />
                      </div>
                      <div>
                        <h1 className="text-2xl font-bold tracking-wider">NARA <span className="text-red-500">PUSTAKA</span></h1>
                        <p className="text-[10px] text-gray-400 tracking-widest uppercase">Penerbit & Distributor</p>
                      </div>
                    </div>
                  </div>
                  
                  <div className="text-right text-white z-10">
                    <h2 className="text-4xl font-bold text-red-600 tracking-widest mb-4 uppercase">Invoice</h2>
                    <table className="text-xs text-gray-300 ml-auto">
                      <tbody>
                        <tr>
                          <td className="pr-4 py-1 text-right">Invoice Number:</td>
                          <td className="text-white font-medium text-right">{invoiceData.invoiceNo}</td>
                        </tr>
                        <tr>
                          <td className="pr-4 py-1 text-right">Invoice Date:</td>
                          <td className="text-white font-medium text-right">{formatDateId(invoiceData.date)}</td>
                        </tr>
                        <tr>
                          <td className="pr-4 py-1 text-right text-red-400">Due Date:</td>
                          <td className="text-red-400 font-medium text-right">{formatDateId(invoiceData.dueDate)}</td>
                        </tr>
                      </tbody>
                    </table>
                  </div>
                  <div className="absolute -bottom-5 left-0 w-3/5 h-6 bg-red-600 clip-slant"></div>
                </div>

                <div className="px-12 py-10 flex-grow relative z-10">
                  <div className="flex justify-between mb-8">
                    <div className="w-1/2 pr-4">
                      <h3 className="text-red-600 font-bold text-sm mb-2 uppercase tracking-wide">Invoice To:</h3>
                      <h4 className="text-xl font-bold text-gray-800 mb-1 line-clamp-1">{invoiceData.customerName}</h4>
                      <p className="text-xs text-gray-600 whitespace-pre-wrap leading-relaxed line-clamp-3">{invoiceData.notes}</p>
                    </div>
                    <div className="w-1/3">
                      <h3 className="text-red-600 font-bold text-sm mb-2 uppercase tracking-wide">Payment Method</h3>
                      <div className="text-xs text-gray-800 leading-relaxed bg-gray-50 p-3 rounded border-l-2 border-red-600">
                        <p className="mb-1 text-gray-500">Transfer Bank</p>
                        <p>Account No: <span className="font-bold text-sm ml-1">11-047-0742</span></p>
                        <p>Account Name: <span className="font-bold ml-1">Deby Verona</span></p>
                      </div>
                    </div>
                  </div>

                  <table className="w-full text-left mb-8 border-collapse">
                    <thead>
                      <tr className="bg-red-600 text-white text-xs uppercase tracking-wider">
                        <th className="py-3 px-4 w-[50%]">Item Description</th>
                        <th className="py-3 px-4 text-center">Price</th>
                        <th className="py-3 px-4 text-center">Qty</th>
                        <th className="py-3 px-4 text-right">Total</th>
                      </tr>
                    </thead>
                    <tbody className="text-sm">
                      {items.map((item, index) => (
                        <tr key={item.id} className={`border-b border-gray-100 ${index % 2 === 0 ? 'bg-gray-50/50' : 'bg-white'}`}>
                          <td className="py-3 px-4 text-gray-800 font-medium">{item.description || '-'}</td>
                          <td className="py-3 px-4 text-gray-600 text-center">Rp {Number(item.price).toLocaleString('id-ID')}</td>
                          <td className="py-3 px-4 text-gray-600 text-center">{item.qty}</td>
                          <td className="py-3 px-4 text-gray-800 text-right font-medium">Rp {(Number(item.qty) * Number(item.price)).toLocaleString('id-ID')}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>

                  <div className="flex justify-between items-start">
                    <div className="w-1/2 pr-8">
                      <h3 className="font-bold text-gray-800 mb-4 text-lg">Thank You</h3>
                      <div className="space-y-2 text-xs text-gray-600">
                        <p className="flex items-center gap-2"><Phone size={14} className="text-red-600" /> +62 812-3456-7890</p>
                        <p className="flex items-center gap-2"><Mail size={14} className="text-red-600" /> narapustaka1@gmail.com</p>
                      </div>
                    </div>

                    <div className="w-[45%]">
                      <div className="flex justify-between py-2 text-sm text-gray-600 border-b border-gray-100">
                        <span className="font-medium">Subtotal:</span>
                        <span>Rp {subtotal.toLocaleString('id-ID')}</span>
                      </div>
                      <div className="flex justify-between py-2 text-sm text-gray-600">
                        <span className="font-medium">Ongkir:</span>
                        <span>Rp {Number(invoiceData.shippingCost).toLocaleString('id-ID')}</span>
                      </div>
                      
                      <div className="flex justify-between py-4 mt-2 bg-red-600 text-white font-bold px-4 text-lg rounded-sm shadow-md">
                        <span>Total:</span>
                        <span>Rp {total.toLocaleString('id-ID')}</span>
                      </div>
                    </div>
                  </div>
                </div>

                <div className="px-12 pb-8 mt-auto relative shrink-0">
                  <div className="flex justify-between items-end mb-6">
                    <div className="w-3/5 pr-10">
                      <h4 className="font-bold text-gray-800 text-sm mb-2">Terms & Conditions:</h4>
                      <p className="text-[10px] text-gray-500 leading-relaxed text-justify">
                        Pembayaran harap ditransfer secara penuh ke rekening yang tertera di atas. 
                        Sertakan nomor invoice pada berita acara transfer. Barang pesanan akan dikirim setelah 
                        dana dikonfirmasi masuk. Kesalahan alamat yang diberikan oleh pembeli di luar tanggung jawab kami.
                      </p>
                    </div>
                    <div className="w-1/3 text-center pt-8">
                      <div className="border-b border-gray-400 mb-2 w-full"></div>
                      <p className="text-xs font-bold text-gray-800">Admin Nara Pustaka</p>
                      <p className="text-[10px] text-gray-500">Authorized Signature</p>
                    </div>
                  </div>
                  <div className="absolute bottom-0 left-0 w-full h-10 bg-[#1a1c23]">
                    <div className="absolute bottom-0 right-0 w-1/3 h-10 bg-red-600 clip-slant-reverse"></div>
                  </div>
                </div>

              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
